version: "3.8"

services:
  # ============================================
  # PRIMARY DATABASE
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: echo-knight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: echoknight
      POSTGRES_PASSWORD: echoknight_secure_pass
      POSTGRES_DB: echoknight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echoknight -d echoknight"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MESSAGE BROKER
  # ============================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: echo-knight-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: echoknight
      RABBITMQ_DEFAULT_PASS: echoknight_secure_pass
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # CACHE & SESSION STORE
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: echo-knight-redis
    restart: unless-stopped
    command: redis-server --requirepass echoknight_secure_pass
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "echoknight_secure_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # OBJECT STORAGE (S3-COMPATIBLE)
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: echo-knight-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: echoknight
      MINIO_ROOT_PASSWORD: echoknight_secure_pass
    ports:
      - "9000:9000"     # API
      - "9001:9001"     # Console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ============================================
  # ADMINER (Database Management UI)
  # ============================================
  adminer:
    image: adminer:4.8.1
    container_name: echo-knight-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

# ============================================
# VOLUMES (Persistent Data)
# ============================================
volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  minio_data:

# ============================================
# NETWORKS
# ============================================
networks:
  default:
    name: echo-knight-network
